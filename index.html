<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Minha App - Firebase Like API</title>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
    body { background: #0f0f23; color: #fff; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { color: #00d4aa; margin-bottom: 20px; }
    .card { background: #1a1a2e; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    input, button { padding: 10px 15px; border-radius: 8px; border: none; margin: 5px; }
    input { background: #16213e; color: #fff; width: 200px; }
    button { background: #00d4aa; color: #0f0f23; cursor: pointer; font-weight: bold; }
    button:hover { background: #00b894; }
    .tarefa { background: #16213e; padding: 15px; border-radius: 8px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
    .tarefa.concluida { opacity: 0.5; text-decoration: line-through; }
    .badge { background: #e74c3c; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
    .badge.alta { background: #e74c3c; }
    .badge.media { background: #f39c12; }
    .badge.baixa { background: #27ae60; }
    #status { position: fixed; top: 20px; right: 20px; padding: 10px 20px; border-radius: 20px; font-size: 14px; }
    #status.online { background: #27ae60; }
    #status.offline { background: #e74c3c; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="status" class="offline">● Offline</div>
  
  <div class="container">
    <h1>🔥 Firebase-Like API Demo</h1>

    <!-- LOGIN -->
    <div id="loginSection" class="card">
      <h3>🔐 Login</h3>
      <input type="email" id="email" placeholder="Email" value="joao@email.com">
      <input type="password" id="password" placeholder="Senha" value="123456">
      <button onclick="fazerLogin()">Entrar</button>
      <button onclick="criarConta()">Criar Conta</button>
    </div>

    <!-- APP -->
    <div id="appSection" class="card hidden">
      <h3>👤 <span id="userName"></span></h3>
      <button onclick="sair()">Sair</button>
      
      <h3 style="margin-top: 20px;">📝 Nova Tarefa</h3>
      <input type="text" id="novaTarefa" placeholder="Título da tarefa">
      <select id="prioridade">
        <option value="alta">Alta</option>
        <option value="media" selected>Média</option>
        <option value="baixa">Baixa</option>
      </select>
      <button onclick="adicionarTarefa()">Adicionar</button>
      
      <h3 style="margin-top: 20px;">📋 Minhas Tarefas</h3>
      <div id="listaTarefas"></div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000';
    let token = localStorage.getItem('token');
    let socket = null;
    let tarefas = [];

    // Verificar se já está logado
    if (token) {
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('appSection').classList.remove('hidden');
      carregarUsuario();
      conectarRealtime();
      carregarTarefas();
    }

    async function fazerLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      const res = await fetch(`${API_URL}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      
      const data = await res.json();
      if (data.token) {
        token = data.token;
        localStorage.setItem('token', token);
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('appSection').classList.remove('hidden');
        document.getElementById('userName').textContent = data.user.displayName || data.user.email;
        conectarRealtime();
        carregarTarefas();
      } else {
        alert(data.message || 'Erro no login');
      }
    }

    async function criarConta() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      const res = await fetch(`${API_URL}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, displayName: email.split('@')[0] })
      });
      
      const data = await res.json();
      if (data.token) {
        token = data.token;
        localStorage.setItem('token', token);
        fazerLogin();
      } else {
        alert(data.message || 'Erro no registro');
      }
    }

    async function carregarUsuario() {
      const res = await fetch(`${API_URL}/auth/me`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      if (data.user) {
        document.getElementById('userName').textContent = data.user.displayName || data.user.email;
      }
    }

    async function adicionarTarefa() {
      const titulo = document.getElementById('novaTarefa').value;
      const prioridade = document.getElementById('prioridade').value;
      
      if (!titulo) return;
      
      await fetch(`${API_URL}/db/tarefas`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ titulo, prioridade, concluida: false })
      });
      
      document.getElementById('novaTarefa').value = '';
      carregarTarefas();
    }

    async function carregarTarefas() {
      const res = await fetch(`${API_URL}/db/tarefas?orderBy=prioridade`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      tarefas = data.documents || [];
      renderizarTarefas();
    }

    function renderizarTarefas() {
      const container = document.getElementById('listaTarefas');
      container.innerHTML = '';
      
      tarefas.forEach(t => {
        const div = document.createElement('div');
        div.className = `tarefa ${t.data.concluida ? 'concluida' : ''}`;
        div.innerHTML = `
          <div>
            <strong>${t.data.titulo}</strong>
            <span class="badge ${t.data.prioridade}">${t.data.prioridade}</span>
          </div>
          <div>
            <button onclick="toggleTarefa('${t.id}', ${!t.data.concluida})">
              ${t.data.concluida ? '↩️' : '✅'}
            </button>
            <button onclick="deletarTarefa('${t.id}')" style="background:#e74c3c">🗑️</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    async function toggleTarefa(id, concluida) {
      await fetch(`${API_URL}/db/tarefas/${id}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ concluida })
      });
      carregarTarefas();
    }

    async function deletarTarefa(id) {
      await fetch(`${API_URL}/db/tarefas/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      carregarTarefas();
    }

    function conectarRealtime() {
      socket = io(API_URL);
      
      socket.on('connect', () => {
        document.getElementById('status').className = 'online';
        document.getElementById('status').textContent = '● Online';
        socket.emit('authenticate', token);
        socket.emit('subscribe', 'tarefas');
      });
      
      socket.on('disconnect', () => {
        document.getElementById('status').className = 'offline';
        document.getElementById('status').textContent = '● Offline';
      });
      
      socket.on('collection:change', (event) => {
        console.log('Mudança detectada:', event);
        carregarTarefas(); // Recarrega quando algo muda
      });
    }

    function sair() {
      localStorage.removeItem('token');
      token = null;
      if (socket) socket.disconnect();
      location.reload();
    }
  </script>
</body>
</html>
