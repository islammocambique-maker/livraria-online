<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desbloquear Livro - Livraria Online</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif}
body{background:linear-gradient(135deg,#1a365d,#2d3748);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:40px 32px;max-width:420px;width:100%;box-shadow:0 20px 40px rgba(0,0,0,.3);text-align:center}
.icon{width:70px;height:70px;background:linear-gradient(135deg,#d69e2e,#b7791f);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:2rem;color:#fff}
.card h1{color:#1a365d;font-size:1.6rem;margin-bottom:8px}
.card .sub{color:#666;font-size:.95rem;margin-bottom:28px}
.form-group{margin-bottom:18px;text-align:left}
.form-group label{display:block;font-weight:600;font-size:.85rem;color:#333;margin-bottom:6px}
.form-group label i{color:#d69e2e;margin-right:4px}
input{width:100%;padding:14px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:1rem;transition:border-color .3s}
input:focus{outline:none;border-color:#2c5282}
input::placeholder{color:#a0aec0}
.btn{width:100%;padding:16px;background:linear-gradient(135deg,#d69e2e,#b7791f);color:#fff;border:none;border-radius:10px;font-size:1.05rem;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(214,158,46,.4)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.result{display:none;margin-top:24px;padding:20px;border-radius:10px;animation:fadeIn .4s}
.result.show{display:block}
.ok{background:#f0fff4;border:1px solid #9ae6b4}
.ok h3{color:#276749;font-size:1.1rem;margin-bottom:10px}
.ok p{color:#666;font-size:.9rem;margin-bottom:16px}
.btn-down{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:#48bb78;color:#fff;text-decoration:none;border-radius:10px;font-weight:700}
.btn-down:hover{background:#38a169}
.erro{background:#fff5f5;border:1px solid #feb2b2}
.erro h3{color:#c53030;font-size:1.1rem;margin-bottom:8px}
.erro p{color:#666;font-size:.9rem}
.back{display:inline-block;margin-top:24px;color:#666;text-decoration:none;font-size:.9rem}
.back:hover{color:#1a365d}
.spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
.btn.loading .spinner{display:inline-block}
.btn.loading .txt{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.steps{display:flex;justify-content:center;gap:8px;margin-bottom:28px}
.step{width:32px;height:32px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#718096}
.step.active{background:#d69e2e;color:#fff}
.step.done{background:#48bb78;color:#fff}
.line{width:30px;height:2px;background:#e2e8f0;align-self:center}
.line.done{background:#48bb78}
@media(max-width:400px){.card{padding:28px 20px}}
</style>
<base target="_blank">
</head>
<body>

<div class="card">
<div class="icon">🔓</div>
<h1>Desbloquear Livro</h1>
<p class="sub">Insira seus dados para acessar seu PDF</p>

<div class="steps">
<div class="step active" id="s1">1</div>
<div class="line" id="l1"></div>
<div class="step" id="s2">2</div>
<div class="line" id="l2"></div>
<div class="step" id="s3">3</div>
</div>

<form id="form">
<div class="form-group">
<label>📱 Telefone</label>
<input type="tel" id="tel" placeholder="5511999999999" required pattern="[+]?[0-9]{10,15}">
</div>
<div class="form-group">
<label>🔑 Código de Acesso</label>
<input type="text" id="cod" placeholder="LIVRO-XXXX-XXXX" required style="text-transform:uppercase" maxlength="14">
</div>
<button type="submit" class="btn" id="btn">
<span class="txt">Desbloquear Livro</span>
<span>➜</span>
<div class="spinner"></div>
</button>
</form>

<div class="result ok" id="ok">
<h3>✅ Código Validado!</h3>
<p>Seu livro está pronto para download.</p>
<a href="#" class="btn-down" id="link" target="_blank">📥 Baixar PDF</a>
</div>

<div class="result erro" id="erro">
<h3>❌ Código Inválido</h3>
<p id="errMsg">Código inválido ou já utilizado.</p>
</div>

<a href="index.html" class="back">← Voltar para a loja</a>
</div>

<script src="dados.js"></script>
<script>
// Auto-formata código
document.getElementById('cod').addEventListener('input',function(e){
let v=e.target.value.toUpperCase().replace(/[^A-Z0-9-]/g,'');
if(v.length>5&&v.charAt(5)!=='-')v=v.slice(0,5)+'-'+v.slice(5);
if(v.length>10&&v.charAt(10)!=='-')v=v.slice(0,10)+'-'+v.slice(10);
e.target.value=v;
});

document.getElementById('form').addEventListener('submit',function(e){
e.preventDefault();
const tel=document.getElementById('tel').value.replace(/\D/g,'');
const cod=document.getElementById('cod').value.toUpperCase();
const btn=document.getElementById('btn');

// Esconde resultados
ok.classList.remove('show');
erro.classList.remove('show');

// Valida
if(!/^LIVRO-[A-Z0-9]{4}-[A-Z0-9]{4}$/.test(cod)){
document.getElementById('errMsg').textContent='Formato inválido. Use: LIVRO-XXXX-XXXX';
erro.classList.add('show');
return;
}

btn.disabled=true;
btn.classList.add('loading');

// Busca código
const c=CODIGOS.find(x=>x.codigo===cod&&x.telefone===tel);

setTimeout(()=>{
btn.disabled=false;
btn.classList.remove('loading');

if(!c){
document.getElementById('errMsg').textContent='Código não encontrado para este telefone.';
erro.classList.add('show');
return;
}

if(c.usado){
document.getElementById('errMsg').textContent='Este código já foi utilizado.';
erro.classList.add('show');
return;
}

// Encontra produto
const prod=PRODUTOS.find(p=>p.id===c.produtoId);
if(!prod||!prod.pdfUrl){
document.getElementById('errMsg').textContent='Livro não encontrado.';
erro.classList.add('show');
return;
}

// Marca como usado
c.usado=true;
c.dataUso=new Date().toISOString();
salvarCodigos();

// Registra histórico
HISTORICO.push({codigo:cod,telefone:tel,produto:prod.nome,data:new Date().toISOString()});
salvarHistorico();

// Mostra download
ok.classList.add('show');
document.getElementById('link').href=prod.pdfUrl;

// Atualiza steps
document.getElementById('s1').className='step done';
document.getElementById('l1').className='line done';
document.getElementById('s2').className='step done';
document.getElementById('l2').className='line done';
document.getElementById('s3').className='step done';

},800);
});
</script>

</body>
</html>
